{% extends 'master.html' %}
{% load static %}
{% block title %}

    AdminKit Demo - Bootstrap 5 Admin Template

{% endblock %}

{% block contain %}

<div class="main-panel">
          <div class="content-wrapper">
            <div class="page-header">
              
              <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                  <li class="breadcrumb-item"><a href="#">Forms</a></li>
                  <li class="breadcrumb-item active" aria-current="page">Form elements</li>
                </ol>
              </nav>
            </div>
            <div class="row">
              <div class="col-md-12 grid-margin stretch-card">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Default form</h4>
                    <p class="card-description"> Basic form layout </p>
                     <form action="/addteachers_edit/{{teacheredit.id}}" method="POST" enctype="multipart/form-data">
                      {% csrf_token %}
                      <div class="form-group">
                        <label for="exampleInputName1">Name</label>
                        <input type="text" class="form-control" id="exampleInputName1" name="name" placeholder="enter name" value="{{teacheredit.name}}">
                      </div>
                      
                      <div class="form-group">
                        <label for="exampleInputName1">Enter phone number</label>
                        <input type="number" class="form-control" id="exampleInputName1" name="phone" placeholder="Phone Number" value="{{teacheredit.phone}}">
                      </div>
                      <div class="form-group">
                        <label for="exampleInputName1">Enter email</label>
                        <input type="email" class="form-control" id="exampleInputName1" name="email" placeholder="Email" value="{{teacheredit.email}}">
                      </div>
                      <div class="form-group">
                        <label for="exampleInputName1">Enter password</label>
                        <input type="password" class="form-control" id="exampleInputName1" name="password" placeholder="Password" value="{{teacheredit.password}}">
                      </div>
                      <div class="form-group">
                        <label for="exampleInputName1">Select image</label>
                        <input type="file" class="form-control" id="exampleInputName1" name="file" placeholder="image" value="{{teacheredit.file}}">
                      </div>
                    
                      <button type="submit" class="btn btn-gradient-primary me-2">Update</button>
                      <a href="{% url 'addteachers' %}" class="btn btn-light">Cancel</a>
                    </form>
                  </div>
                </div>
              </div>
			  <div class="row">

                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>

{% endblock %}
